<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Invitación</title>
    <style>
      :root {
        color-scheme: dark;
      }
      body {
        margin: 0;
        min-height: 100svh;
        display: flex;
        justify-content: center;
        align-items: flex-start;
        background: #0b0f14;
        padding: 8px;
        font-family: system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif;
        overflow: hidden;
      }
      .poster {
        position: relative;
        display: inline-block;
        border-radius: 16px;
        overflow: hidden;
        box-shadow: 0 24px 70px rgba(0, 0, 0, 0.55);
        background: #000;
      }
      .poster video {
        display: block;
        width: 762px;
        height: auto;
        max-width: calc(100vw - 16px);
        max-height: calc(100svh - 16px);
        object-fit: cover;
      }
      @keyframes pulse {
        0% {
          background-color: rgba(255, 255, 255, 0);
          box-shadow: inset 0 0 0 0 rgba(255, 255, 255, 0);
        }
        50% {
          background-color: rgba(255, 255, 255, 0.15);
          box-shadow: inset 0 0 15px 2px rgba(255, 255, 255, 0.3);
        }
        100% {
          background-color: rgba(255, 255, 255, 0);
          box-shadow: inset 0 0 0 0 rgba(255, 255, 255, 0);
        }
      }
      .hotspot {
        position: absolute;
        display: block;
        border-radius: 10px;
        animation: pulse 2s infinite;
        cursor: pointer;
        transition: all 0.3s ease;
      }
      .hotspot:hover {
        background-color: rgba(255, 255, 255, 0.2);
      }
      .hotspot:focus-visible {
        outline: 3px solid rgba(255, 255, 255, 0.9);
        outline-offset: 4px;
      }
      .hotspot-combined {
        left: 10%;
        top: 49%;
        width: 87%;
        height: 8%;
        opacity: 0;
        pointer-events: none;
      }
      .hotspot-combined.is-visible {
        opacity: 1;
        pointer-events: auto;
      }
      .video-btn {
        position: absolute;
        top: 50%;
        left: 0;
        right: 0;
        transform: translateY(-50%);
        background: transparent;
        color: white;
        border: 0;
        padding: 0;
        cursor: pointer;
        transition: all 0.3s ease;
        z-index: 10;
        font-family: inherit;
        display: flex;
        justify-content: center;
        align-items: center;
        gap: 6px;
      }
      .video-btn img {
        display: block;
        width: 100%;
        height: auto;
      }
      .video-btn:hover {
        transform: translateY(-50%) scale(1.02);
      }
      .video-btn.is-hidden {
        opacity: 0;
        pointer-events: none;
        transform: translateY(-50%) scale(0.98);
      }
    </style>
  </head>
  <body>
    <main>
      <div class="poster">
        <video id="bg-video" src="./video.mp4" loop playsinline preload="metadata"></video>

        <button id="video-control" class="video-btn" type="button" aria-label="Reproducir video">
          <img src="./botón.jpeg" alt="Reproducir" />
        </button>

        <a
          class="hotspot hotspot-combined"
          href="https://www.google.com/maps/place/Salon+de+Fiestas+Toys/@19.4750297,-99.1217475,17z/data=!3m1!4b1!4m6!3m5!1s0x85d1f973624aaf1d:0xd6a72fcd7795f2b3!8m2!3d19.4750297!4d-99.1217475!16s%2Fg%2F11b6v4lm9k!18m1!1e1?entry=ttu&g_ep=EgoyMDI2MDQwOC4wIKXMDSoASAFQAw%3D%3D"
          target="_blank"
          rel="noopener noreferrer"
          aria-label="Abrir ubicación en Google Maps"
        ></a>
      </div>

      <script>
        const video = document.getElementById('bg-video');
        const videoBtn = document.getElementById('video-control');
        const hotspot = document.querySelector('.hotspot-combined');

        const HOTSPOT_TIME_SECONDS = 6;

        const syncUi = () => {
          const shouldShowHotspot =
            Number.isFinite(video.currentTime) && video.currentTime >= HOTSPOT_TIME_SECONDS;

          if (shouldShowHotspot) {
            hotspot.classList.add('is-visible');
          } else {
            hotspot.classList.remove('is-visible');
          }

          if (video.paused) {
            videoBtn.classList.remove('is-hidden');
            videoBtn.setAttribute('aria-label', 'Reproducir video');
          } else {
            videoBtn.classList.add('is-hidden');
          }
        };

        videoBtn.addEventListener('click', async () => {
          if (video.paused) {
            try {
              await video.play();
            } catch {
              return;
            }
          } else {
            video.pause();
          }
          syncUi();
        });

        video.addEventListener('timeupdate', syncUi);
        video.addEventListener('seeked', syncUi);
        video.addEventListener('pause', syncUi);
        video.addEventListener('play', syncUi);
        syncUi();
      </script>
    </main>
  </body>
</html>
