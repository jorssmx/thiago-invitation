<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Invitación</title>
    <style>
      :root {
        color-scheme: dark;
      }
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: #0b0f14;
        padding: 16px;
        font-family: system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif;
      }
      .poster {
        width: min(762px, 100%);
        aspect-ratio: 762 / 1370;
        position: relative;
        border-radius: 16px;
        overflow: hidden;
        box-shadow: 0 24px 70px rgba(0, 0, 0, 0.55);
        background: #000;
      }
      .poster img {
        width: 100%;
        height: 100%;
        display: block;
        object-fit: cover;
      }
      @keyframes pulse {
        0% {
          background-color: rgba(255, 255, 255, 0);
          box-shadow: inset 0 0 0 0 rgba(255, 255, 255, 0);
        }
        50% {
          background-color: rgba(255, 255, 255, 0.15);
          box-shadow: inset 0 0 15px 2px rgba(255, 255, 255, 0.3);
        }
        100% {
          background-color: rgba(255, 255, 255, 0);
          box-shadow: inset 0 0 0 0 rgba(255, 255, 255, 0);
        }
      }
      .hotspot {
        position: absolute;
        display: block;
        border-radius: 10px;
        animation: pulse 2s infinite;
        cursor: pointer;
        transition: all 0.3s ease;
      }
      .hotspot:hover {
        background-color: rgba(255, 255, 255, 0.2);
      }
      .hotspot:focus-visible {
        outline: 3px solid rgba(255, 255, 255, 0.9);
        outline-offset: 4px;
      }
      .hotspot-combined {
        left: 1%;
        top: 52.5%;
        width: 98%;
        height: 14%;
      }
      .audio-btn {
        position: absolute;
        top: 16px;
        right: 16px;
        background: rgba(0, 0, 0, 0.6);
        color: white;
        border: 2px solid rgba(255, 255, 255, 0.3);
        border-radius: 20px;
        padding: 8px 16px;
        font-size: 14px;
        font-weight: bold;
        cursor: pointer;
        backdrop-filter: blur(4px);
        transition: all 0.3s ease;
        z-index: 10;
        font-family: inherit;
        display: flex;
        align-items: center;
        gap: 6px;
      }
      .audio-btn:hover {
        background: rgba(0, 0, 0, 0.8);
        border-color: rgba(255, 255, 255, 0.6);
        transform: scale(1.05);
      }
    </style>
  </head>
  <body>
    <main>
      <div class="poster">
        <img src="./plantilla.png" alt="Invitación" />
        
        <!-- Elemento de audio -->
        <audio id="bg-audio" loop>
          <source src="audio.mp4" type="audio/mp4">
          <source src="audio.mp3" type="audio/mpeg"> <!-- Por si acaso tienes el mp3 -->
          Tu navegador no soporta el elemento de audio.
        </audio>

        <!-- Botón de control -->
        <button id="audio-control" class="audio-btn" aria-label="Reproducir música">
          <span>🔊</span> Reproducir
        </button>

        <a
          class="hotspot hotspot-combined"
          href="https://www.google.com/maps/place/Salon+de+Fiestas+Toys/@19.4750297,-99.1217475,17z/data=!3m1!4b1!4m6!3m5!1s0x85d1f973624aaf1d:0xd6a72fcd7795f2b3!8m2!3d19.4750297!4d-99.1217475!16s%2Fg%2F11b6v4lm9k!18m1!1e1?entry=ttu&g_ep=EgoyMDI2MDQwOC4wIKXMDSoASAFQAw%3D%3D"
          target="_blank"
          rel="noopener noreferrer"
          aria-label="Abrir ubicación en Google Maps"
        ></a>
      </div>

      <script>
        const audio = document.getElementById('bg-audio');
        const audioBtn = document.getElementById('audio-control');

        audioBtn.addEventListener('click', () => {
          if (audio.paused) {
            audio.play();
            audioBtn.innerHTML = '<span>⏸</span> Pausar';
          } else {
            audio.pause();
            audioBtn.innerHTML = '<span>🔊</span> Reproducir';
          }
        });
      </script>
    </main>
  </body>
</html>
